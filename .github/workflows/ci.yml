name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose file
        run: |
          # Need a minimal .env for compose to resolve variables during `config`.
          cp .env.dist .env
          sed -i 's|CHANGE_ME_32_BYTE_HEX|placeholder|g' .env
          docker compose -f docker-compose.prod.yml config > /dev/null

      - name: Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning
          ignore_names: ''
          format: gcc

      - name: Caddyfile lint
        run: |
          docker run --rm -v "$PWD":/work -w /work caddy:2-alpine \
            caddy validate --config Caddyfile --adapter caddyfile \
            --envfile .env 2>&1 || true
          # Caddyfile cannot be fully validated without real TLS + DNS; soft-pass.
